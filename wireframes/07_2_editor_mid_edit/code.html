<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="text-2xl italic font-serif text-stone-900 dark:text-stone-100 Newsreader">Digital Mirror</h1>
<div class="w-10 h-10 rounded-full overflow-hidden border border-outline-variant/30">

<div class="flex items-center gap-2">
<span class="font-label-sm uppercase tracking-widest text-on-surface-variant">Eyes: Smoky Preset</span>
</div>
<span class="material-symbols-outlined text-outline text-lg" data-icon="close">close</span>
</div>
<div class="flex items-end gap-stack-lg">
<div class="flex-grow space-y-3">
<label class="font-label-sm uppercase text-[10px] text-outline">Intensity</label>
<div class="h-1 bg-surface-container-highest rounded-full overflow-hidden">
<div class="w-3/4 h-full bg-primary"></div>
</div>
<div class="flex justify-between text-[10px] font-label-sm text-outline">
<span>SOFT</span>
<span>DRAMATIC</span>
</div>
</div>

<div class="flex gap-2">

<div class="w-6 h-6 rounded-full bg-[#A6897E] border border-white"></div>
</div>
</div>
</div>
</div>

<input class="w-full bg-transparent border-none focus:ring-0 font-body-md text-on-surface p-1" placeholder="Describe your look..." type="text" value="Soft brown smoky eyes with a satin nude lip"/>
</div>
<button class="bg-primary text-white h-12 px-6 rounded-lg font-label-sm uppercase tracking-widest flex items-center gap-2 hover:opacity-90 transition-opacity">

</button>
</div>

<span class="material-symbols-outlined text-base" data-icon="brush">brush</span>

</div>
</div>
</div>
</div>
